version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.17

commands:
  install_pnpm:
    steps:
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm@11.6.0

jobs:
  install:
    executor: node
    steps:
      - checkout
      - install_pnpm
      - run:
          name: Configure pnpm store
          command: pnpm config set store-dir ~/.pnpm-store
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
      - persist_to_workspace:
          root: .
          paths:
            - .

  lint:
    executor: node
    steps:
      - attach_workspace:
          at: .
      - install_pnpm
      - run:
          name: Lint
          command: pnpm lint

  type-check:
    executor: node
    steps:
      - attach_workspace:
          at: .
      - install_pnpm
      - run:
          name: Type check
          command: pnpm type-check

  build:
    executor: node
    steps:
      - attach_workspace:
          at: .
      - install_pnpm
      - run:
          name: Build
          command: pnpm build

workflows:
  ci:
    jobs:
      - install
      - lint:
          requires:
            - install
      - type-check:
          requires:
            - install
      - build:
          requires:
            - install
